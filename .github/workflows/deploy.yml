name: Deploy Web App to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # No ref needed here, we're ensuring the latest main is pulled.

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Using a specific, stable Flutter version
          flutter-version: '3.19.6'
          channel: 'stable'

      - name: Clean Flutter build artifacts and dependencies
        run: |
          flutter clean
          flutter pub cache clean # Aggressively clean the pub cache
          flutter pub get

      - name: Build Web App
        run: flutter build web --base-href /subkiller/ # Ensure we're building correctly

      # Capture detailed build output
      - name: Capture build output
        if: steps.build-web.outcome == 'failure'
        run: |
          echo "Build failed. Attempting to capture logs..."
          # Placeholder for log capturing if needed - usually logs are visible in Actions UI

      # The deployment step will depend on the build success.
      # For now, let's focus on making the build itself work.
      # If build succeeds, we'd re-introduce upload/deploy.

      # Temporarily disabling deployment steps to focus on build success
      # - name: Upload artifact for GitHub Pages
      #   uses: actions/upload-artifact@v3
      #   with:
      #     path: ./build/web

      # - name: Deploy to GitHub Pages
      #   uses: actions/deploy-pages@v1

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Opt into Node.js 24
