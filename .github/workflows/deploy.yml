name: Deploy Web App to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2' # Using a recent stable version that should support Dart 3.5+
          channel: 'stable'
          # Optional: Cache Flutter SDK to speed up subsequent runs
          cache: true

      - name: Clean project and cache
        run: |
          flutter clean || true
          flutter pub
