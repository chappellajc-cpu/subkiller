steps:
  - name: Checkout repository
    uses: actions/checkout@v4 # Updated to v4

  - name: Setup Flutter
    uses: subosito/flutter-action@v2
    with:
      flutter-version: '3.22.0' # Updated to a specific recent version
      channel: 'stable'

  - name: Get dependencies
    run: flutter pub get

  - name: Build Web App
    run: flutter build web --base-href /subkiller/

  - name: Deploy to GitHub Pages
    uses: peaceiris/actions-gh-pages@v3 # Keeping v3 as it's stable and widely used, but checking for v4 compatibility
    with:
      github_token: ${{ secrets.GITHUB_TOKEN }}
      publish_dir: ./build/web
      publish_branch: gh-pages
      user_name: 'github-actions[bot]'
      user_email: 'github-actions[bot]@users.noreply.github.com'
